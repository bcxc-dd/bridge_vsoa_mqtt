# ============================================================
# MQTT ↔ VSOA 桥接组件 — 配置文件
# ============================================================

# ---------- 桥接组件信息 ----------
bridge:
  name: "MQTT-VSOA Bridge"
  version: "1.0.0"

# ---------- VSOA 连接 ----------
vsoa:
  # --- VSOA Server（bridge 内嵌，RPC + Pub/Sub ACK + uplink 查询 + 场景引擎）---
  server:
    bind_host: "0.0.0.0"
    port: 3001

  # --- 业务层 VSOA Server（monitor 自动托管，业务逻辑对接此端口）---
  # 监听 0.0.0.0 后，局域网电脑可通过 vsoa://本机IP:3000 连接。
  business_server:
    auto_start: true
    bind_host: "0.0.0.0"
    port: 3000
    advertised_url: "vsoa://192.168.200.204:3000"

  # --- Pub/Sub Client（连接业务层 VSOA Server，订阅 /ctrl/cmd）---
  # 默认连接本机业务服务；局域网客户端使用运行主机的实际 IP 访问。
  # 仅上行运行可使用 --uplink-only。
  pubsub_client:
    server_url: "vsoa://127.0.0.1:3000"
    subscribe_urls:
      - "/ctrl/cmd"
    ack_publish_url: "/ctrl/ack"

  # --- VSOA 断连重试 ---
  reconnect:
    enabled: true
    interval_ms: 3000
    max_retries: 10
    backoff_multiplier: 2.0

# ---------- MQTT 连接 ----------
mqtt:
  # LoRaWAN 网关当前所在局域网的 MQTT Broker
  broker: "192.168.200.221"
  port: 1883
  username: ""
  password: ""
  keepalive: 60
  client_id: "mqtt-vsoa-bridge-lora"
  qos: 1
  retained: false
  reconnect:
    enabled: true
    interval_ms: 3000
    max_retries: 0 # 0 = 无限重试

  # --- 上行订阅 topic ---
  uplink_topics:
    - "application/+/device/+/event/up"
    - "bridge/uplink/lora/+/data"
    - "bridge/uplink/zigbee/+/data"
    - "bridge/uplink/generic/+/data"
    - "bridge/uplink/generic/+/status"
    - "bridge/uplink/generic/+/error"
    - "lora/+/up"
    - "zigbee/+/report"
    - "s3/eora-s3-400tb-001/data"

  # --- 下行发布 topic ---
  downlink_topic_prefix: "bridge/downlink"
  downlink_topic_prefixes: {}
    # lora:   "lora/cmd"
    # zigbee: "zigbee/cmd"

  # 不同项目可使用独立 Broker。上行进入同一设备注册表，下行按项目路由。
  project_brokers:
    zigbee:
      broker: "192.168.200.169"
      port: 1883
      username: ""
      password: ""
      keepalive: 60
      client_id: "mqtt-vsoa-bridge-zigbee"
      qos: 1
      uplink_topics:
        - "bridge/uplink/zigbee/+/data"
        - "zigbee/+/report"

# ---------- 上行处理 ----------
uplink:
  tcp_inject_port: 9090
  max_devices: 64
  max_json_len: 8192
  max_topic_len: 192
  max_device_id_len: 64
  adapters: ["lora", "zigbee", "generic"]
  camera:
    enabled: true
    uplink_fport: 2
    timeout_seconds: 60
    max_image_bytes: 8192

# ---------- 下行命令处理 ----------
downlink:
  command:
    default_timeout_ms: 10000
    max_timeout_ms: 60000
    pending_queue_size: 100

    dedup:
      enabled: true
      ttl_seconds: 300
      max_size: 10000

    retry:
      max_retries: 3
      backoff_base_ms: 500

# ---------- ChirpStack 下行适配（方案 B） ----------
chirpstack:
  enabled: true # 启用 ChirpStack 下行格式
  confirmed: true # LoRaWAN confirmed downlink
  fPort: 1 # LoRaWAN fPort
  application_id: "3ed92fba-9e06-4b8e-ad41-54927a0fa89d" # 摄像头 ACK fallback；优先使用上行自带 applicationId

# ---------- 日志 ----------
logging:
  level: "INFO"
  format: "[%(asctime)s] [%(levelname)s] %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  file: ""

# ---------- 场景联动引擎 ----------
scene_engine:
  enabled: true
  rules_path: "scenes.yaml"
  default_cooldown_seconds: 60
  max_rules: 100
  max_conditions_per_rule: 10
  max_actions_per_rule: 10
